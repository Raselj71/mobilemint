<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4FE0A6"/>
      <stop offset="0.55" stop-color="#34CB8C"/>
      <stop offset="1" stop-color="#1FAE76"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DBFBEE"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A5A3C" flood-opacity="0.28"/>
    </filter>
    <radialGradient id="sheen" cx="0.32" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>

  <g filter="url(#soft)">
    <!-- M lettermark -->
    <path d="M150,382 L150,168 L256,300 L362,168 L362,382"
          fill="none" stroke="#FFFFFF" stroke-width="46"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- mint leaf sprouting from the M valley -->
    <path d="M256,304
             C 304,266 308,206 256,176
             C 204,206 208,266 256,304 Z"
          fill="url(#leaf)"/>
  </g>

  <!-- leaf vein -->
  <path d="M256,300 C 256,260 256,220 256,182"
        fill="none" stroke="#27C083" stroke-width="7" stroke-linecap="round"/>
  <path d="M256,238 C 274,232 286,226 296,214" fill="none" stroke="#27C083" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M256,262 C 238,256 226,250 216,238" fill="none" stroke="#27C083" stroke-width="5.5" stroke-linecap="round"/>
</svg>
